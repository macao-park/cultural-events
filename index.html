<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 문화행사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2EC;
  --surface: #FDFAF5;
  --text: #1A1714;
  --muted: #7A746A;
  --border: #E2DDD4;
  --accent: #C84B2F;
  --accent-bg: #FFF0EC;
  --green: #2A6B4A;
  --green-bg: #EBF5EF;
  --blue: #1F4F8A;
  --blue-bg: #EBF0FA;
  --amber: #8A5A1A;
  --amber-bg: #FDF5E6;
  --pink: #8A2A5A;
  --pink-bg: #FAE8F2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif KR', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── layout ── */
.wrap { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 4rem; }

header {
  padding: 2.5rem 0 1.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.site-title {
  font-size: 1.6rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--text);
}
.site-title em { font-style: italic; color: var(--accent); }

.meta-line {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── tabs & filter ── */
.controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }

.tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.tab-btn {
  padding: 7px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  background: var(--surface);
  border: none;
  cursor: pointer;
  color: var(--muted);
  border-right: 1px solid var(--border);
  transition: all 0.15s;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: var(--text); color: var(--bg); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { border-color: currentColor; }
.filter-btn[data-cat="전시"].active { color: var(--blue); background: var(--blue-bg); border-color: var(--blue); }
.filter-btn[data-cat="공연"].active { color: var(--pink); background: var(--pink-bg); border-color: var(--pink); }
.filter-btn[data-cat="영화"].active { color: var(--amber); background: var(--amber-bg); border-color: var(--amber); }
.filter-btn[data-cat="축제"].active { color: var(--green); background: var(--green-bg); border-color: var(--green); }
.filter-btn[data-cat="기타"].active { color: var(--muted); background: var(--border); border-color: var(--muted); }
.filter-btn[data-cat="all"].active { color: var(--accent); background: var(--accent-bg); border-color: var(--accent); }

/* ── add btn ── */
.add-fab {
  position: fixed;
  bottom: 2rem; right: 2rem;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--text);
  color: var(--bg);
  border: none;
  font-size: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: transform 0.15s;
}
.add-fab:hover { transform: scale(1.06); }

/* ── list view ── */
#list-view { display: block; }
.event-list { display: flex; flex-direction: column; gap: 1px; }

.event-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0 1rem;
  align-items: center;
  cursor: pointer;
  transition: border-color 0.15s;
  margin-bottom: 6px;
}
.event-row:hover { border-color: var(--muted); }

.event-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.badge-전시 { color: var(--blue); background: var(--blue-bg); }
.badge-공연 { color: var(--pink); background: var(--pink-bg); }
.badge-영화 { color: var(--amber); background: var(--amber-bg); }
.badge-축제 { color: var(--green); background: var(--green-bg); }
.badge-기타 { color: var(--muted); background: var(--border); }

.event-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
}
.event-venue {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.event-dates {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
}
.event-status { font-size: 11px; margin-top: 2px; text-align: right; }
.status-예정 { color: var(--accent); }
.status-다녀옴 { color: var(--green); }
.status-취소 { color: var(--muted); }

/* ── calendar view ── */
#cal-view { display: none; }
.cal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.cal-header h2 { font-size: 1.1rem; font-weight: 400; }
.cal-nav { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; cursor: pointer; color: var(--muted); font-size: 14px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-dow { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0; letter-spacing: 0.05em; }
.cal-cell {
  min-height: 70px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  vertical-align: top;
}
.cal-cell.other-month { background: transparent; border-color: transparent; }
.cal-cell.today { border-color: var(--accent); }
.cal-cell .day-num { font-size: 11px; margin-bottom: 4px; }
.cal-event-chip {
  display: block;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-family: 'Noto Serif KR', serif;
  font-weight: 400;
}

/* ── modal ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 12px;
  padding: 2rem;
  width: 100%;
  max-width: 480px;
  margin: 1rem;
  position: relative;
}
.modal h3 { font-size: 1rem; font-weight: 400; margin-bottom: 1.5rem; }
.form-row { margin-bottom: 1rem; }
.form-row label { display: block; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 5px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--muted); }
.form-row textarea { resize: vertical; min-height: 70px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; }
.btn {
  padding: 8px 20px;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  transition: all 0.15s;
}
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-danger { color: var(--accent); border-color: var(--accent); }
.btn:hover { opacity: 0.8; }
.close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }

/* ── state ── */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

/* ── config banner ── */
.config-banner {
  background: var(--accent-bg);
  border: 1px solid #f0c0b0;
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  font-size: 13px;
  display: none;
}
.config-banner.show { display: block; }
.config-banner strong { color: var(--accent); }

@media (max-width: 600px) {
  .event-row { grid-template-columns: 1fr; gap: 6px; }
  .event-dates { text-align: left; }
  .event-status { text-align: left; }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1 class="site-title">내 <em>문화행사</em> 일정</h1>
      <p class="meta-line" id="event-count">— 행사 불러오는 중</p>
    </div>
  </header>

  <div class="config-banner" id="config-banner">
    <strong>⚙ 설정 필요</strong> — <code>config.js</code>에서 <strong>SCRIPT_URL</strong>을 Google Apps Script 배포 URL로 바꿔주세요.
    (<a href="https://github.com" target="_blank">설정 가이드 보기</a>)
  </div>

  <div class="controls">
    <div class="tabs">
      <button class="tab-btn active" onclick="setView('list')">목록</button>
      <button class="tab-btn" onclick="setView('cal')">캘린더</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="all" onclick="setFilter(this,'all')">전체</button>
      <button class="filter-btn" data-cat="전시" onclick="setFilter(this,'전시')">전시</button>
      <button class="filter-btn" data-cat="공연" onclick="setFilter(this,'공연')">공연</button>
      <button class="filter-btn" data-cat="영화" onclick="setFilter(this,'영화')">영화</button>
      <button class="filter-btn" data-cat="축제" onclick="setFilter(this,'축제')">축제</button>
      <button class="filter-btn" data-cat="기타" onclick="setFilter(this,'기타')">기타</button>
    </div>
  </div>

  <div id="list-view"><div class="loading">불러오는 중...</div></div>

  <div id="cal-view">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">←</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav" onclick="changeMonth(1)">→</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
  </div>
</div>

<button class="add-fab" title="행사 추가" onclick="openModal()">＋</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 id="modal-title">새 행사 추가</h3>

    <div class="form-row">
      <label>행사명</label>
      <input type="text" id="f-title" placeholder="예: 2026 부산비엔날레">
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>분류</label>
        <select id="f-cat">
          <option>전시</option><option>공연</option><option>영화</option><option>축제</option><option>기타</option>
        </select>
      </div>
      <div class="form-row">
        <label>상태</label>
        <select id="f-status">
          <option>예정</option><option>다녀옴</option><option>취소</option>
        </select>
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>시작일</label>
        <input type="date" id="f-start">
      </div>
      <div class="form-row">
        <label>종료일</label>
        <input type="date" id="f-end">
      </div>
    </div>
    <div class="form-row">
      <label>장소</label>
      <input type="text" id="f-venue" placeholder="예: 부산현대미술관">
    </div>
    <div class="form-row">
      <label>링크 (선택)</label>
      <input type="url" id="f-url" placeholder="https://...">
    </div>
    <div class="form-row">
      <label>메모 (선택)</label>
      <textarea id="f-memo" placeholder="같이 갈 사람, 티켓 예매 여부 등"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" id="delete-btn" onclick="deleteEvent()" style="display:none">삭제</button>
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<script>
const DB = 'https://cultural-events-5fcd8-default-rtdb.firebaseio.com/events';

let allEvents = [];
let activeFilter = 'all';
let currentView = 'list';
let calYear, calMonth;
let editingId = null;
const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

async function loadEvents() {
  const res = await fetch(DB + '.json');
  const data = await res.json();
  allEvents = data ? Object.entries(data).map(([k,v]) => ({...v, _key: k})) : [];
  updateCount();
  renderCurrent();
}

async function apiAdd(data) {
  await fetch(DB + '.json', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
}

async function apiUpdate(key, data) {
  await fetch(DB + '/' + key + '.json', {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
}

async function apiDelete(key) {
  await fetch(DB + '/' + key + '.json', { method: 'DELETE' });
}

function updateCount() {
  const f = filtered();
  document.getElementById('event-count').textContent =
    `— 총 ${f.length}개 행사 · 예정 ${f.filter(e => e.status === '예정').length}개`;
}

function filtered() {
  return activeFilter === 'all' ? allEvents : allEvents.filter(e => e.category === activeFilter);
}

function renderList() {
  const el = document.getElementById('list-view');
  const list = filtered().sort((a, b) => (a.startDate||'').localeCompare(b.startDate||''));
  if (!list.length) { el.innerHTML = '<p class="empty">등록된 행사가 없어요</p>'; return; }
  el.innerHTML = `<div class="event-list">${list.map(e => `
    <div class="event-row" onclick="openModal('${e._key}')">
      <span class="event-badge badge-${e.category}">${e.category}</span>
      <div>
        <div class="event-title">${e.title}</div>
        ${e.venue ? `<div class="event-venue">📍 ${e.venue}</div>` : ''}
      </div>
      <div>
        <div class="event-dates">${fmtDate(e.startDate)}${e.endDate && e.endDate !== e.startDate ? ' ~<br>' + fmtDate(e.endDate) : ''}</div>
        <div class="event-status status-${e.status}">${e.status}</div>
      </div>
    </div>`).join('')}</div>`;
}

function renderCal() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent = `${calYear}년 ${months[calMonth]}`;
  const grid = document.getElementById('cal-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = `${today.getFullYear()}-${p(today.getMonth()+1)}-${p(today.getDate())}`;
  const CHIP_COLORS = { '전시':'#EBF0FA','공연':'#FAE8F2','영화':'#FDF5E6','축제':'#EBF5EF','기타':'#E2DDD4' };
  const CHIP_TEXT  = { '전시':'#1F4F8A','공연':'#8A2A5A','영화':'#8A5A1A','축제':'#2A6B4A','기타':'#7A746A' };
  for (let i = 0; i < firstDay; i++) {
    const d = document.createElement('div'); d.className = 'cal-cell other-month'; grid.appendChild(d);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${p(calMonth+1)}-${p(d)}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (dateStr === todayStr ? ' today' : '');
    const dayEvents = allEvents.filter(e => e.startDate <= dateStr && (e.endDate||e.startDate) >= dateStr);
    cell.innerHTML = `<div class="day-num">${d}</div>` +
      dayEvents.slice(0,2).map(e =>
        `<span class="cal-event-chip" style="background:${CHIP_COLORS[e.category]||'#E2DDD4'};color:${CHIP_TEXT[e.category]||'#7A746A'}">${e.title}</span>`
      ).join('') +
      (dayEvents.length > 2 ? `<span style="font-size:9px;color:var(--muted)">+${dayEvents.length-2}개</span>` : '');
    grid.appendChild(cell);
  }
}

function openModal(key) {
  editingId = key || null;
  document.getElementById('modal-title').textContent = key ? '행사 수정' : '새 행사 추가';
  document.getElementById('delete-btn').style.display = key ? 'block' : 'none';
  if (key) {
    const e = allEvents.find(ev => ev._key === key);
    if (e) {
      document.getElementById('f-title').value = e.title;
      document.getElementById('f-cat').value = e.category;
      document.getElementById('f-status').value = e.status;
      document.getElementById('f-start').value = e.startDate;
      document.getElementById('f-end').value = e.endDate || '';
      document.getElementById('f-venue').value = e.venue;
      document.getElementById('f-url').value = e.url;
      document.getElementById('f-memo').value = e.memo;
    }
  } else {
    ['f-title','f-venue','f-url','f-memo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-cat').value = '전시';
    document.getElementById('f-status').value = '예정';
    document.getElementById('f-start').value = '';
    document.getElementById('f-end').value = '';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveEvent() {
  const data = {
    title: document.getElementById('f-title').value.trim(),
    category: document.getElementById('f-cat').value,
    status: document.getElementById('f-status').value,
    startDate: document.getElementById('f-start').value,
    endDate: document.getElementById('f-end').value,
    venue: document.getElementById('f-venue').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
  };
  if (!data.title) { alert('행사명을 입력해주세요'); return; }
  if (editingId) {
    await apiUpdate(editingId, data);
    const idx = allEvents.findIndex(e => e._key === editingId);
    if (idx > -1) allEvents[idx] = {...data, _key: editingId};
  } else {
    await apiAdd(data);
    await loadEvents();
  }
  closeModal();
  updateCount();
  renderCurrent();
}

async function deleteEvent() {
  if (!confirm('이 행사를 삭제할까요?')) return;
  await apiDelete(editingId);
  allEvents = allEvents.filter(e => e._key !== editingId);
  closeModal();
  updateCount();
  renderCurrent();
}

function setView(v) {
  currentView = v;
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('cal-view').style.display = v === 'cal' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active',(i===0)===(v==='list')));
  renderCurrent();
}

function setFilter(btn, cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCount();
  renderCurrent();
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}

function renderCurrent() {
  if (currentView === 'list') renderList();
  else renderCal();
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
