<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4ab9aef133dd7020f01301238c4d622d&libraries=services"></script>
</head>
<style>
:root {
  --bg: #F5F2EC;
  --surface: #FDFAF5;
  --text: #1A1714;
  --muted: #7A746A;
  --border: #E2DDD4;
  --accent: #C84B2F;
  --accent-bg: #FFF0EC;
  --green: #2A6B4A;
  --green-bg: #EBF5EF;
  --blue: #1F4F8A;
  --blue-bg: #EBF0FA;
  --amber: #8A5A1A;
  --amber-bg: #FDF5E6;
  --pink: #8A2A5A;
  --pink-bg: #FAE8F2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif KR', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── layout ── */
.wrap { max-width: 900px; margin: 0 auto; padding: 0 1rem 4rem; overflow-x: hidden; }

header {
  padding: 2.5rem 0 1.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.site-title {
  font-size: 1.6rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--text);
}
.site-title em { font-style: italic; color: var(--accent); }

.meta-line {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  letter-spacing: 0.05em;
}

/* ── tabs & filter ── */
.controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px; }

.tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.tab-btn {
  padding: 7px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  background: var(--surface);
  border: none;
  cursor: pointer;
  color: var(--muted);
  border-right: 1px solid var(--border);
  transition: all 0.15s;
}
.tab-btn:last-child { border-right: none; }
.tab-btn.active { background: var(--text); color: var(--bg); }

.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px;
  font-size: 12px;
  font-family: 'DM Mono', monospace;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active { border-color: currentColor; }
.filter-btn[data-cat="전시"].active { color: var(--blue); background: var(--blue-bg); border-color: var(--blue); }
.filter-btn[data-cat="공연"].active { color: var(--pink); background: var(--pink-bg); border-color: var(--pink); }
.filter-btn[data-cat="문화"].active { color: var(--amber); background: var(--amber-bg); border-color: var(--amber); }
.filter-btn[data-cat="축제"].active { color: var(--green); background: var(--green-bg); border-color: var(--green); }
.filter-btn[data-cat="기타"].active { color: var(--muted); background: var(--border); border-color: var(--muted); }
.filter-btn[data-cat="all"].active { color: var(--accent); background: var(--accent-bg); border-color: var(--accent); }

/* ── add btn ── */
.add-fab {
  position: fixed;
  bottom: 5.5rem; right: 2rem;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--text);
  color: var(--bg);
  border: none;
  font-size: 26px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: transform 0.15s;
}
.add-fab:hover { transform: scale(1.06); }

/* ── list view ── */
#list-view { display: block; }
.event-list { display: flex; flex-direction: column; gap: 1px; }

.event-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem 1.25rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 0 1rem;
  align-items: center;
  cursor: pointer;
  transition: border-color 0.15s;
  margin-bottom: 6px;
}
.event-row:hover { border-color: var(--muted); }

.event-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.badge-전시 { color: var(--blue); background: var(--blue-bg); }
.badge-공연 { color: var(--pink); background: var(--pink-bg); }
.badge-문화 { color: var(--amber); background: var(--amber-bg); }
.badge-축제 { color: var(--green); background: var(--green-bg); }
.badge-기타 { color: var(--muted); background: var(--border); }

.event-title {
  font-size: 15px;
  font-weight: 400;
  color: var(--text);
}
.event-venue {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.event-dates {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
}
.event-status { font-size: 11px; margin-top: 2px; text-align: right; }
.status-예정 { color: var(--accent); }
.status-다녀옴 { color: var(--green); }
.status-취소 { color: var(--muted); }

/* ── calendar view ── */
#cal-view { display: none; }
.cal-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.cal-header h2 { font-size: 1.1rem; font-weight: 400; }
.cal-nav { background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; cursor: pointer; color: var(--muted); font-size: 14px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; overflow: hidden; }
.cal-dow { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0; letter-spacing: 0.05em; }
.cal-cell {
  min-height: 70px;
  overflow: hidden;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  vertical-align: top;
}
.cal-cell.other-month { background: transparent; border-color: transparent; }
.cal-cell.today { border-color: var(--accent); }
.cal-cell .day-num { font-size: 11px; margin-bottom: 4px; }
.cal-event-chip {
  display: block;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  font-family: 'Noto Serif KR', serif;
  font-weight: 400;
}

/* ── modal ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,23,20,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: 12px;
  padding: 2rem;
  width: 100%;
  max-width: 480px;
  margin: 1rem;
  position: relative;
}
.modal h3 { font-size: 1rem; font-weight: 400; margin-bottom: 1.5rem; }
.form-row { margin-bottom: 1rem; }
.form-row label { display: block; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 5px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--muted); }
.form-row textarea { resize: vertical; min-height: 70px; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; }
.btn {
  padding: 8px 20px;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  transition: all 0.15s;
}
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-danger { color: var(--accent); border-color: var(--accent); }
.btn:hover { opacity: 0.8; }
.close-btn { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }

/* ── state ── */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

/* ── config banner ── */
.config-banner {
  background: var(--accent-bg);
  border: 1px solid #f0c0b0;
  border-radius: 8px;
  padding: 1rem 1.25rem;
  margin-bottom: 1.5rem;
  font-size: 13px;
  display: none;
}
.config-banner.show { display: block; }
.config-banner strong { color: var(--accent); }

@media (max-width: 600px) {
  .event-row { grid-template-columns: 1fr; gap: 6px; }
  .event-dates { text-align: left; }
  .event-status { text-align: left; }
  .cal-grid { gap: 2px; }
  .cal-cell { min-height: 44px; padding: 3px; }
  .cal-cell .day-num { font-size: 10px; }
  .cal-event-chip { font-size: 8px; padding: 1px 3px; }
  .cal-dow { font-size: 9px; }
  .cal-header h2 { font-size: 0.95rem; }
  .wrap { padding: 0 0.5rem 4rem; }
  .cal-grid { grid-template-columns: repeat(7, minmax(0, 1fr)); }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div>
      <h1 class="site-title"> <em>BMS</em> </h1>
      <p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:0.06em">일상이 예술이 되는 순간</p>
      <button onclick="checkAdmin()" id="admin-btn" style="position:fixed;bottom:0.5rem;right:0.7rem;font-family:'DM Mono',monospace;font-size:10px;background:none;border:none;cursor:pointer;color:var(--border);z-index:50;padding:4px">관리자</button>
    </div>
  </header>

  <div class="config-banner" id="config-banner">
    <strong>⚙ 설정 필요</strong> — <code>config.js</code>에서 <strong>SCRIPT_URL</strong>을 Google Apps Script 배포 URL로 바꿔주세요.
    (<a href="https://github.com" target="_blank">설정 가이드 보기</a>)
  </div>

  
  <div class="controls">
    <div class="tabs">
      <button class="tab-btn active" onclick="setView('list')">목록</button>
      <button class="tab-btn" onclick="setView('cal')">캘린더</button>
      <button class="tab-btn" onclick="setView('map')">지도</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-cat="all" onclick="setFilter(this,'all')">전체</button>
      <button class="filter-btn" data-cat="전시" onclick="setFilter(this,'전시')">전시</button>
      <button class="filter-btn" data-cat="공연" onclick="setFilter(this,'공연')">공연</button>
      <button class="filter-btn" data-cat="문화" onclick="setFilter(this,'문화')">문화</button>
      <button class="filter-btn" data-cat="축제" onclick="setFilter(this,'축제')">축제</button>
      <button class="filter-btn" data-cat="기타" onclick="setFilter(this,'기타')">기타</button>
    </div>
    <button id="past-btn" onclick="togglePast()" style="padding:5px 12px;font-size:12px;font-family:'DM Mono',monospace;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer">지난 행사 보기</button>
    <div id="search-wrap" style="display:inline-flex;align-items:center;gap:6px">
  <input type="text" id="search-input" placeholder="검색..." oninput="renderCurrent()"
    style="width:0;padding:0;border:none;background:transparent;font-family:'Noto Serif KR',serif;font-size:13px;color:var(--text);outline:none;transition:width 0.3s,padding 0.3s;overflow:hidden">
  <button onclick="toggleSearch()" id="search-btn"
    style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px">🔍</button>
</div>
  </div>

  <div id="list-view"><div class="loading">불러오는 중...</div></div>

  <div id="cal-view">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">←</button>
      <h2 id="cal-title"></h2>
      <button class="cal-nav" onclick="changeMonth(1)">→</button>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow">토</div>
    </div>
  </div>
  <div id="map-view" style="display:none">
  <div id="kakao-map" style="width:100%;height:500px;border-radius:12px;overflow:hidden"></div>
</div>
</div>

<button class="add-fab" title="행사 추가" onclick="openModal()">＋</button>

<!-- 상세보기 Modal -->
<div class="overlay" id="detail-overlay" onclick="closeDetailOutside(event)">
  <div class="modal" id="detail-modal">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div id="detail-img-wrap" style="margin:-2rem -2rem 1.5rem;border-radius:12px 12px 0 0;overflow:hidden;display:none">
  <img id="detail-img" style="width:100%;height:320px;object-fit:cover">
</div>
    <h3 id="detail-title"></h3>
    <div class="form-row"><label>분류</label><div id="detail-cat"></div></div>
    <div class="form-row"><label>기간</label><div id="detail-date"></div></div>
    <div class="form-row"><label>장소</label><div id="detail-venue"></div></div>
    <div class="form-row" id="detail-url-row"><label>링크</label><div id="detail-url"></div></div>
    <div class="form-row" id="detail-memo-row"><label>메모</label><div id="detail-memo"></div></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="detail-delete-btn" onclick="deleteFromDetail()">삭제</button>
      <button class="btn" onclick="closeDetail()">닫기</button>
      <button class="btn btn-primary" onclick="switchToEdit()">행사수정</button>
    </div>
  </div>
</div>

<!-- 수정/추가 Modal -->
<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 id="modal-title">새 행사 추가</h3>

    <div class="form-row">
      <label>행사명</label>
      <input type="text" id="f-title" placeholder="예: 2026 부산비엔날레">
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>분류</label>
        <select id="f-cat">
          <option>전시</option><option>공연</option><option>문화</option><option>축제</option><option>기타</option>
        </select>
      </div>
    </div>

    <div class="form-row">
  <label>기간 표시 (선택)</label>
  <input type="text" id="f-period" placeholder="예: 6. 4(목) ~ 6. 21(일) [매주 목~일 운영]">
</div>
    
    <div class="form-row-2">
      <div class="form-row">
        <label>시작일</label>
        <input type="date" id="f-start">
      </div>
      <div class="form-row">
        <label>종료일</label>
        <input type="date" id="f-end">
      </div>
    </div>
    <div class="form-row">
      <label>장소</label>
      <input type="text" id="f-venue" placeholder="예: 부산현대미술관">
    <div class="form-row">
      <label>지도용 주소 (선택)</label>
      <input type="text" id="f-venueAddr" placeholder="예: 부산광역시 해운대구 수영강변대로 120">
    </div>
    </div>
    <div class="form-row">
      <label>링크 (선택)</label>
      <input type="url" id="f-url" placeholder="https://...">
    </div>
    <div class="form-row">
      <label>포스터 이미지 URL (선택)</label>
      <input type="url" id="f-img" placeholder="https://...이미지주소">
    </div>
    <div class="form-row">
      <label>메모 (선택)</label>
      <textarea id="f-memo" placeholder="같이 갈 사람, 티켓 예매 여부 등"></textarea>
    </div>

    <div class="form-row" id="repeat-row">
  <label>반복 (선택)</label>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="0"> 일</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="1"> 월</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="2"> 화</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="3"> 수</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="4"> 목</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="5"> 금</label>
    <label style="font-size:13px;display:flex;align-items:center;gap:4px"><input type="checkbox" value="6"> 토</label>
  </div>
  <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">체크하면 시작일~종료일 사이 해당 요일마다 자동 등록</div>
</div>


    
    <div class="modal-actions">
      <button class="btn btn-danger" id="delete-btn" onclick="deleteEvent()" style="display:none">삭제</button>
      <button class="btn" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<script>
const DB = 'https://cultural-events-5fcd8-default-rtdb.firebaseio.com/events';
const ADMIN_PW = '1234';
let isAdmin = false;
let allEvents = [];
let activeFilter = 'all';
let currentView = 'list';
let calYear, calMonth;
let editingId = null;
let showPast = false;
const today = new Date();
calYear = today.getFullYear();
calMonth = today.getMonth();

async function loadEvents() {
  const res = await fetch(DB + '.json');
  const data = await res.json();
  allEvents = data ? Object.entries(data).map(([k,v]) => ({...v, _key: k})) : [];
  updateCount();
  renderCurrent();
}

async function apiAdd(data) {
  await fetch(DB + '.json', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
}

async function apiUpdate(key, data) {
  await fetch(DB + '/' + key + '.json', {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
}

async function apiDelete(key) {
  await fetch(DB + '/' + key + '.json', { method: 'DELETE' });
}

let searchOpen = false;
function toggleSearch() {
  searchOpen = !searchOpen;
  const input = document.getElementById('search-input');
  if (searchOpen) {
    input.style.width = '160px';
    input.style.padding = '6px 10px';
    input.style.border = '1px solid var(--border)';
    input.style.borderRadius = '20px';
    input.style.background = 'var(--surface)';
    input.focus();
  } else {
    input.style.width = '0';
    input.style.padding = '0';
    input.style.border = 'none';
    input.style.background = 'transparent';
    input.value = '';
    renderCurrent();
  }
}

  
function togglePast() {
  showPast = !showPast;
  const btn = document.getElementById('past-btn');
  btn.textContent = showPast ? '지난 행사 숨기기' : '지난 행사 보기';
  btn.style.color = showPast ? 'var(--accent)' : 'var(--muted)';
  btn.style.borderColor = showPast ? 'var(--accent)' : 'var(--border)';
  renderCurrent();
}
function updateCount() {}

function filtered() {
  const todayStr = new Date().toISOString().slice(0, 10);
  const query = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  let list = allEvents.filter(e => !e.hidden && !e.calHidden &&
    (showPast || (e.endDate || e.startDate) >= todayStr) &&
    (activeFilter === 'all' || e.category === activeFilter) &&
    (!query || e.title?.toLowerCase().includes(query) || e.venue?.toLowerCase().includes(query))
  );
  return list;
}

function renderList() {
  const el = document.getElementById('list-view');
  const list = filtered().sort((a, b) => (a.startDate||'').localeCompare(b.startDate||''));
  if (!list.length) { el.innerHTML = '<p class="empty">등록된 행사가 없어요</p>'; return; }
el.innerHTML = `<div class="event-list">${list.map(e => `
    <div class="event-row" style="display:grid;grid-template-columns:${e.img ? '120px 1fr' : '1fr'};gap:0;padding:0;overflow:hidden">
      ${e.img ? `<img src="${e.img}" style="width:120px;height:100%;object-fit:cover;min-height:100px;border-radius:8px 0 0 8px">` : ''}
      <div style="padding:12px 14px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <span class="event-badge badge-${e.category}">${e.category}</span>
          ${isAdmin ? `<button onclick="openDetail('${e._key}')" style="font-size:11px;font-family:'DM Mono',monospace;background:none;border:1px solid var(--border);border-radius:10px;padding:2px 8px;cursor:pointer;color:var(--muted)">수정</button><button onclick="if(confirm('삭제할까요?')){apiDelete('${e._key}');allEvents=allEvents.filter(ev=>ev._key!=='${e._key}');renderCurrent();}" style="font-size:14px;background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px">🗑️</button>` : ''}        </div>
        <div class="event-title">${e.title}</div>
        ${e.venue ? `<div class="event-venue">📍 ${e.venue} <button onclick="event.stopPropagation();navigator.clipboard.writeText('${e.venue}').then(()=>alert('복사됐어요!'))" style="font-size:10px;font-family:'DM Mono',monospace;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--muted);margin-left:4px">복사</button></div>` : ''}
        ${e.memo ? `<div class="event-venue" style="color:var(--muted)">💬 ${e.memo}</div>` : ''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
          <div class="event-dates" style="white-space:nowrap">${e.period || (fmtDate(e.startDate) + (e.endDate && e.endDate !== e.startDate ? ' ~ ' + fmtDate(e.endDate) : ''))}</div>
          ${e.url ? `<a href="${e.url}" target="_blank" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:10px;padding:2px 10px">LINK</a>` : ''}
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function showMoreEvents(dateStr) {
  const visibleCats = activeFilter === 'all' ? null : activeFilter;
  const dayEvents = allEvents.filter(e => !e.calHidden && e.startDate <= dateStr && (e.endDate||e.startDate) >= dateStr && (!visibleCats || e.category === visibleCats));
  const [y,m,d] = dateStr.split('-');
  alert(`${m}/${d} 행사 목록:\n\n` + dayEvents.map(e => `• ${e.title}`).join('\n'));
}
  function renderMap() {
  const container = document.getElementById('kakao-map');
  const map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(35.1796, 129.0756),
    level: 8
  });

  const CAT_COLORS = { '전시':'#1F4F8A','공연':'#8A2A5A','문화':'#8A5A1A','축제':'#2A6B4A','기타':'#7A746A' };
  const geocoder = new kakao.maps.services.Geocoder();

  const visible = allEvents.filter(e => !e.hidden && !e.calHidden);

  visible.forEach(e => {
    if (!e.venue) return;
    geocoder.addressSearch(e.venueAddr || e.venue, (result, status) => {
      if (status !== kakao.maps.services.Status.OK) return;
      const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
      const color = CAT_COLORS[e.category] || '#7A746A';

      const content = `
  <div onclick="openDetail('${e._key}')" style="cursor:pointer;display:flex;flex-direction:column;align-items:center">
    <div style="background:${color};color:#fff;padding:5px 10px;border-radius:20px;font-size:12px;font-family:'Noto Serif KR',serif;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.25)">${e.category}</div>
    <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:8px solid ${color};margin-top:-1px"></div>
  </div>`;
      const overlay = new kakao.maps.CustomOverlay({ map, position: coords, content, yAnchor: 1 });
    });
  });
}
function renderCal() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-title').textContent = `${calYear}년 ${months[calMonth]}`;
  const grid = document.getElementById('cal-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = `${today.getFullYear()}-${p(today.getMonth()+1)}-${p(today.getDate())}`;

  const CAT_COLORS = { '전시':'#B5D4F4','공연':'#F4C0D1','문화':'#FAC775','축제':'#9FE1CB','기타':'#D3D1C7' };

  let selectedDate = null;

  function renderTodaySection(dateStr, events) {
    let sec = document.getElementById('today-events');
    if (!sec) {
      sec = document.createElement('div');
      sec.id = 'today-events';
      document.getElementById('cal-view').appendChild(sec);
    }
    if (!events || events.length === 0) { sec.innerHTML = ''; return; }
    const [y,m,d] = dateStr.split('-');
sec.innerHTML = `
    <div style="margin-top:1.5rem;border-top:0.5px solid var(--border);padding-top:1rem">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px;letter-spacing:0.05em">${m}/${d} 행사 · ${events.length}건</div>
      <div class="event-list">${events.map(e => `
        <div class="event-row" style="display:grid;grid-template-columns:${e.img ? '120px 1fr' : '1fr'};gap:0;padding:0;overflow:hidden">
          ${e.img ? `<img src="${e.img}" style="width:120px;height:100%;object-fit:cover;min-height:100px;border-radius:8px 0 0 8px">` : ''}
          <div style="padding:12px 14px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
              <span class="event-badge badge-${e.category}">${e.category}</span>${isAdmin ? `<button onclick="event.stopPropagation();if(confirm('삭제할까요?')){apiDelete('${e._key}');allEvents=allEvents.filter(ev=>ev._key!=='${e._key}');renderCurrent();}" style="font-size:14px;background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px">🗑️</button>` : ''}
            </div>
            <div class="event-title">${e.title}</div>
            ${e.venue ? `<div class="event-venue">📍 ${e.venue} <button onclick="event.stopPropagation();navigator.clipboard.writeText('${e.venue}').then(()=>alert('복사됐어요!'))" style="font-size:10px;font-family:'DM Mono',monospace;background:none;border:1px solid var(--border);border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--muted);margin-left:4px">복사</button></div>` : ''}
            ${e.memo ? `<div class="event-venue" style="color:var(--muted)">💬 ${e.memo}</div>` : ''}
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
              <div class="event-dates">${e.period || (fmtDate(e.startDate) + (e.endDate && e.endDate !== e.startDate ? ' ~ ' + fmtDate(e.endDate) : ''))}</div>
              ${e.url ? `<a href="${e.url}" target="_blank" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--accent);text-decoration:none;border:1px solid var(--accent);border-radius:10px;padding:2px 10px">LINK</a>` : ''}
            </div>
          </div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  // 오늘 행사 기본 표시
  const todayEvents = allEvents.filter(e => !e.calHidden && e.startDate <= todayStr && (e.endDate||e.startDate) >= todayStr && (activeFilter === 'all' || e.category === activeFilter) && (showPast || (e.endDate||e.startDate) >= todayStr));
  renderTodaySection(todayStr, todayEvents);

  for (let i = 0; i < firstDay; i++) {
    const d = document.createElement('div'); d.className = 'cal-cell other-month';
    d.style.cssText = 'border:none;background:transparent;';
    grid.appendChild(d);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${p(calMonth+1)}-${p(d)}`;
    const isToday = dateStr === todayStr;
    const dow = new Date(calYear, calMonth, d).getDay();
    const isSun = dow === 0;
    const isSat = dow === 6;
    const dayEvents = allEvents.filter(e => !e.calHidden && e.startDate <= dateStr && (e.endDate||e.startDate) >= dateStr && (activeFilter === 'all' || e.category === activeFilter) && (showPast || (e.endDate||e.startDate) >= todayStr));

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday ? ' today' : '');
    cell.style.cssText = 'border:none;background:transparent;padding:4px 2px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer';

    const numColor = isToday ? '#fff' : (isSun || isSat) ? '#C84B2F' : 'var(--text)';
    const numBg = isToday ? '#1A1714' : 'transparent';
    cell.innerHTML = `<div style="font-family:'DM Mono',monospace;font-size:13px;color:${numColor};background:${numBg};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;">${d}</div>`;

    // 동그라미 아이콘
    if (dayEvents.length > 0) {
      const dotsWrap = document.createElement('div');
      dotsWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:2px;justify-content:center;max-width:36px';
      dayEvents.forEach(e => {
        const dot = document.createElement('div');
        dot.style.cssText = `width:7px;height:7px;border-radius:50%;background:${CAT_COLORS[e.category]||'#D3D1C7'}`;
        dotsWrap.appendChild(dot);
      });
      cell.appendChild(dotsWrap);
    }

    // 날짜 클릭 → 해당일 행사 표시
    cell.onclick = () => {
      document.querySelectorAll('.cal-cell.selected').forEach(c => {
        c.classList.remove('selected');
        c.style.background = 'transparent';
      });
      cell.classList.add('selected');
      cell.style.background = 'var(--accent-bg)';
      renderTodaySection(dateStr, dayEvents);
    };

    grid.appendChild(cell);
  }
}

function openDetail(key) {
  const e = allEvents.find(ev => ev._key === key);
  if (!e) return;
  editingId = key;
  const imgWrap = document.getElementById('detail-img-wrap');
const imgEl = document.getElementById('detail-img');
if (e.img) {
  imgEl.src = e.img;
  imgWrap.style.display = 'block';
} else {
  imgWrap.style.display = 'none';
}
  document.getElementById('detail-title').textContent = e.title;
  document.getElementById('detail-cat').textContent = e.category;
  document.getElementById('detail-date').textContent = e.startDate + (e.endDate && e.endDate !== e.startDate ? ' ~ ' + e.endDate : '');
  document.getElementById('detail-venue').innerHTML = e.venue 
  ? `${e.venue} <button onclick="navigator.clipboard.writeText('${e.venue}').then(()=>alert('주소가 복사됐어요!'))" style="margin-left:8px;padding:3px 8px;font-size:11px;font-family:'DM Mono',monospace;background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--muted)">복사</button>`
  : '—';
  const urlRow = document.getElementById('detail-url-row');
  const urlEl = document.getElementById('detail-url');
  if (e.url) { urlEl.innerHTML = `<a href="${e.url}" target="_blank" style="display:inline-block;padding:6px 14px;background:var(--text);color:var(--bg);border-radius:6px;font-family:'DM Mono',monospace;font-size:12px;text-decoration:none">🔗 링크 열기</a>`; urlRow.style.display=''; }
  else { urlRow.style.display='none'; }
  const memoRow = document.getElementById('detail-memo-row');
  if (e.memo) { document.getElementById('detail-memo').textContent = e.memo; memoRow.style.display=''; }
  else { memoRow.style.display='none'; }
  document.getElementById('detail-delete-btn').style.display = isAdmin ? 'block' : 'none';
  document.querySelector('#detail-modal .btn-primary').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }
function closeDetailOutside(e) { if (e.target === document.getElementById('detail-overlay')) closeDetail(); }

function switchToEdit() {
  closeDetail();
  openModal(editingId);
}

function deleteFromDetail() {
  closeDetail();
  deleteEvent();
}
  
function openModal(key) {
  editingId = key || null;
  document.getElementById('modal-title').textContent = key ? '행사 수정' : '새 행사 추가';
  document.getElementById('delete-btn').style.display = key ? 'block' : 'none';
  if (key) {
    const e = allEvents.find(ev => ev._key === key);
    if (e) {
      document.getElementById('f-title').value = e.title;
      document.getElementById('f-cat').value = e.category;
      document.getElementById('f-start').value = e.startDate;
      document.getElementById('f-end').value = e.endDate || '';
      document.getElementById('f-venue').value = e.venue;
      document.getElementById('f-venueAddr').value = e.venueAddr || '';
      document.getElementById('f-period').value = e.period || '';
      document.getElementById('f-url').value = e.url;
      document.getElementById('f-img').value = e.img || '';
      document.getElementById('f-memo').value = e.memo;
    }
  } else {
    ['f-title','f-venue','f-url','f-img','f-memo'].forEach(id => document.getElementById(id).value = '');    document.getElementById('f-cat').value = '전시';
    document.getElementById('f-start').value = '';
    document.getElementById('f-end').value = '';
  }
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveEvent() {
  const data = {
    title: document.getElementById('f-title').value.trim(),
    category: document.getElementById('f-cat').value,
    period: document.getElementById('f-period').value.trim(),
    startDate: document.getElementById('f-start').value,
    endDate: document.getElementById('f-end').value,
    venue: document.getElementById('f-venue').value.trim(),
    venueAddr: document.getElementById('f-venueAddr').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
    img: document.getElementById('f-img').value.trim(),
  };
  if (!data.title) { alert('행사명을 입력해주세요'); return; }

  // 반복 요일 체크
  const checkedDays = [...document.querySelectorAll('#repeat-row input[type=checkbox]:checked')]
    .map(cb => parseInt(cb.value));

  if (editingId) {
    // 수정은 반복 없이
    await apiUpdate(editingId, data);
    const idx = allEvents.findIndex(e => e._key === editingId);
    const targetGroupId = idx > -1 ? allEvents[idx].groupId : null;
    if (idx > -1) allEvents[idx] = {...allEvents[idx], ...data};
    if (targetGroupId) {
      const siblings = allEvents.filter(e => e.groupId === targetGroupId && e._key !== editingId);
      for (const s of siblings) {
        await apiUpdate(s._key, { title: data.title, category: data.category, venue: data.venue, url: data.url, memo: data.memo, period: data.period });
  }
}
  } else if (checkedDays.length > 0 && data.startDate && data.endDate) {
    // 대표 행사 1개 (목록용)
    const groupId = Date.now().toString();
    await apiAdd({ ...data, calHidden: true, groupId });
    // 날짜별 행사 (캘린더용, hidden)
    const start = new Date(data.startDate);
    const end = new Date(data.endDate);
    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
      if (checkedDays.includes(d.getDay())) {
        const dateStr = d.toISOString().slice(0, 10);
        await apiAdd({ ...data, startDate: dateStr, endDate: dateStr, hidden: true, groupId });
      }
    }
    await loadEvents();
  } else {
    // 일반 등록
    await apiAdd(data);
    await loadEvents();
  }

  closeModal();
  updateCount();
  renderCurrent();
}

async function deleteEvent() {
  if (!confirm('이 행사를 삭제할까요?')) return;
  await apiDelete(editingId);
  allEvents = allEvents.filter(e => e._key !== editingId);
  closeModal();
  updateCount();
  renderCurrent();
}

function setView(v) {
  location.hash = v;
  currentView = v;
  document.getElementById('list-view').style.display = v === 'list' ? 'block' : 'none';
  document.getElementById('cal-view').style.display = v === 'cal' ? 'block' : 'none';
  document.getElementById('map-view').style.display = v === 'map' ? 'block' : 'none';
  if (v === 'map') renderMap();
  const btns = document.querySelectorAll('.tab-btn');
  btns.forEach(b => b.classList.remove('active'));
  if (v === 'list') btns[0].classList.add('active');
  else if (v === 'cal') btns[1].classList.add('active');
  else if (v === 'map') btns[2].classList.add('active');
  renderCurrent();
}
function setFilter(btn, cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateCount();
  renderCurrent();
}

function changeMonth(d) {
  calMonth += d;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}

function renderCurrent() {
  if (currentView === 'list') renderList();
  else renderCal();
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${m}/${day}`;
}
function p(n) { return String(n).padStart(2,'0'); }

function checkAdmin() {
  if (isAdmin) {
    if (confirm('관리자 모드를 종료할까요?')) {
      isAdmin = false;
      sessionStorage.removeItem('admin');
      document.getElementById('admin-btn').textContent = '관리자';
      document.getElementById('admin-btn').style.color = '';
      renderCurrent();
    }
    return;
  }
  const pw = prompt('관리자 비밀번호를 입력하세요');
  if (pw === ADMIN_PW) {
    isAdmin = true;
    sessionStorage.setItem('admin', '1');
    document.getElementById('admin-btn').textContent = '관리자 ✓';
    document.getElementById('admin-btn').style.color = 'var(--accent)';
    renderCurrent();
  }
}

function renderAdminUI() {
  document.querySelector('.add-fab').style.display = isAdmin ? 'flex' : 'none';
}

function renderCurrent() {
  renderAdminUI();  // ← 추가
  if (currentView === 'list') renderList();
  else renderCal();
}

if (sessionStorage.getItem('admin')) {
  isAdmin = true;
  document.getElementById('admin-btn').textContent = '관리자 ✓';
  document.getElementById('admin-btn').style.color = 'var(--accent)';
}
  
const hash = location.hash.replace('#','');
if (hash === 'cal' || hash === 'map' || hash === 'list') setView(hash);
else setView('list');
loadEvents();
  
</script>
